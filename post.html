<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Loading… — Great Physician</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --cream: #faf8f4; --surface: #f0ebe0; --border: #e0d8cc; --gold: #c9a84c; --gold-dark: #8b5e1a; --text-dark: #2c1a0e; --text-mid: #7a6a58; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 18px 48px; display: flex; align-items: center; justify-content: space-between;
      background: rgba(250,248,244,0.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--text-dark); text-decoration: none; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { color: var(--text-mid); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold-dark); }
    .nav-links a.active { color: var(--gold-dark); }

    .post-hero {
      padding: 130px 24px 60px; text-align: center;
      background: radial-gradient(ellipse at 50% 30%, #f0ebe0 0%, #faf8f4 100%);
      border-bottom: 1px solid var(--border);
    }
    .post-category { font-size: 0.68rem; letter-spacing: 0.45em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 16px; }
    .post-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; color: var(--text-dark); line-height: 1.15; max-width: 800px; margin: 0 auto 12px; }
    .post-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; font-weight: 300; color: var(--text-mid); max-width: 720px; margin: 0 auto 20px; line-height: 1.5; }
    .post-meta { font-size: 0.75rem; color: var(--text-mid); letter-spacing: 0.15em; }

    .post-body { max-width: 680px; margin: 0 auto; padding: 72px 24px; }
    .post-body p { font-size: 0.95rem; line-height: 1.95; color: var(--text-mid); font-weight: 300; margin-bottom: 24px; }
    .post-body p strong { color: var(--text-dark); font-weight: 500; }
    .post-body p em { font-style: italic; }
    .post-body h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: var(--text-dark); margin: 40px 0 16px; }
    .post-body h3 { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.1em; color: var(--gold-dark); text-transform: uppercase; margin: 32px 0 12px; }

    .scripture-block { border-left: 3px solid var(--gold); background: var(--surface); padding: 20px 24px; margin: 28px 0; border-radius: 2px; }
    .scripture-block p { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--text-dark); margin-bottom: 8px !important; line-height: 1.6; }
    .scripture-block .ref { font-family: 'Montserrat', sans-serif; font-size: 0.68rem; letter-spacing: 0.25em; color: var(--gold-dark); font-style: normal; margin-bottom: 0 !important; text-transform: uppercase; }

    .post-scripture-tag { text-align: center; margin-top: 40px; padding: 24px; border-top: 1px solid var(--border); }
    .post-scripture-tag span { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--gold-dark); text-transform: uppercase; }

    .post-nav {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--border); padding-top: 32px; margin-top: 48px;
      flex-wrap: wrap; gap: 16px;
    }
    .post-nav a { font-size: 0.75rem; letter-spacing: 0.2em; color: var(--gold-dark); text-transform: uppercase; text-decoration: none; }
    .post-nav a:hover { color: var(--text-dark); }

    .related { background: var(--surface); border-top: 1px solid var(--border); padding: 60px 24px; }
    .related-inner { max-width: 680px; margin: 0 auto; }
    .related-label { font-size: 0.68rem; letter-spacing: 0.4em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 24px; text-align: center; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .related-card { background: var(--cream); border: 1px solid var(--border); border-radius: 4px; padding: 20px; text-decoration: none; display: block; transition: border-color 0.2s; }
    .related-card:hover { border-color: var(--gold); }
    .related-date { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 8px; }
    .related-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--text-dark); line-height: 1.4; }

    .error-state, .loading-state {
      max-width: 680px; margin: 0 auto; padding: 160px 24px 80px; text-align: center;
    }
    .error-state h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; color: var(--text-dark); margin-bottom: 16px; }
    .error-state p, .loading-state p { color: var(--text-mid); font-size: 0.95rem; line-height: 1.8; }
    .error-state a { color: var(--gold-dark); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; display: inline-block; margin-top: 24px; }

    footer { padding: 40px 24px; text-align: center; border-top: 1px solid var(--border); }
    footer p { font-size: 0.78rem; color: var(--text-mid); letter-spacing: 0.1em; line-height: 2; }
    footer a { color: var(--gold-dark); text-decoration: none; }

    @media (max-width: 768px) { nav { padding: 16px 20px; } .nav-links { display: none; } }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">Great Physician</a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#download">Download</a></li>
    <li><a href="/#contact">Contact</a></li>
    <li><a href="/#donate">Give</a></li>
  </ul>
</nav>

<main id="post-root">
  <div class="loading-state"><p>Loading…</p></div>
</main>

<footer>
  <p>© 2026 The Kiln · Nashville, Tennessee</p>
  <p style="margin-top: 8px;"><a href="/privacy">Privacy Policy</a> · <a href="mailto:support@thekiln.org">support@thekiln.org</a></p>
</footer>

<script>
(function() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatDate(iso) {
    if (!iso) return '';
    const parts = iso.split('-');
    if (parts.length !== 3) return iso;
    const [y, m, d] = parts.map(Number);
    if (!y || !m || !d) return iso;
    return `${months[m-1]} ${d}, ${y}`;
  }

  // Inline markdown for paragraphs: **bold**, *italic*
  function inlineMarkdown(text) {
    // text is already HTML-escaped; we only operate on the escaped form
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, '$1<em>$2</em>');
    return text;
  }

  // Render one element of the body array
  function renderBodyElement(item) {
    const trimmed = (item || '').trim();
    if (!trimmed) return '';

    // H2 — "## Heading"
    if (trimmed.startsWith('## ')) {
      return `<h2>${escapeHtml(trimmed.slice(3).trim())}</h2>`;
    }
    // H3 — "### Heading"
    if (trimmed.startsWith('### ')) {
      return `<h3>${escapeHtml(trimmed.slice(4).trim())}</h3>`;
    }
    // Scripture block — starts with "> " and contains a line beginning with "—"
    if (trimmed.startsWith('> ')) {
      const lines = trimmed.split('\n');
      const quoteLines = [];
      let ref = '';
      for (const ln of lines) {
        const t = ln.trim();
        if (t.startsWith('> ')) {
          quoteLines.push(t.slice(2).trim());
        } else if (t.startsWith('—')) {
          ref = t.replace(/^—\s*/, '').trim();
        }
      }
      const quote = quoteLines.join(' ');
      const refHtml = ref ? `<p class="ref">${escapeHtml(ref)}</p>` : '';
      return `<div class="scripture-block"><p>${escapeHtml(quote)}</p>${refHtml}</div>`;
    }
    // Plain paragraph (with inline markdown)
    return `<p>${inlineMarkdown(escapeHtml(trimmed))}</p>`;
  }

  function renderBody(bodyArray) {
    if (!Array.isArray(bodyArray)) return '';
    return bodyArray.map(renderBodyElement).filter(Boolean).join('\n');
  }

  function pickRelated(posts, currentSlug, currentCategory, max = 3) {
    const others = posts.filter(p => p.slug !== currentSlug);
    const sameCategory = others.filter(p => p.category === currentCategory);
    const rest = others.filter(p => p.category !== currentCategory);
    const sorted = (list) => list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    return [...sorted(sameCategory), ...sorted(rest)].slice(0, max);
  }

  function renderRelated(related) {
    if (!related.length) return '';
    const cards = related.map(p => `
      <a class="related-card" href="post.html?slug=${encodeURIComponent(p.slug)}">
        <p class="related-date">${escapeHtml(formatDate(p.date))}</p>
        <p class="related-title">${escapeHtml(p.title)}</p>
      </a>
    `).join('');
    return `
      <div class="related">
        <div class="related-inner">
          <p class="related-label">Continue Reading</p>
          <div class="related-grid">${cards}</div>
        </div>
      </div>
    `;
  }

  function renderPost(post, allPosts) {
    document.getElementById('page-title').textContent = `${post.title} — Great Physician`;

    const subtitle = post.subtitle ? `<p class="post-subtitle">${escapeHtml(post.subtitle)}</p>` : '';
    const category = post.category ? `<p class="post-category">${escapeHtml(post.category)}</p>` : '';
    const meta = [formatDate(post.date), post.author, 'The Kiln'].filter(Boolean).join(' · ');
    const scriptureTag = post.scripture
      ? `<div class="post-scripture-tag"><span>${escapeHtml(post.scripture)}</span></div>`
      : '';

    const related = pickRelated(allPosts, post.slug, post.category, 3);

    document.getElementById('post-root').innerHTML = `
      <div class="post-hero">
        ${category}
        <h1 class="post-title">${escapeHtml(post.title)}</h1>
        ${subtitle}
        <p class="post-meta">${escapeHtml(meta)}</p>
      </div>
      <article class="post-body">
        ${renderBody(post.body)}
        ${scriptureTag}
        <div class="post-nav">
          <a href="/blog">← Back to Blog</a>
          <a href="https://apps.apple.com/app/id6760920054" target="_blank" rel="noopener">Download the App →</a>
        </div>
      </article>
      ${renderRelated(related)}
    `;
  }

  function renderError(msg, technical) {
    document.getElementById('page-title').textContent = 'Post Not Found — Great Physician';
    const tech = technical ? `<p style="font-size:0.75rem;margin-top:8px;">${escapeHtml(technical)}</p>` : '';
    document.getElementById('post-root').innerHTML = `
      <div class="error-state">
        <h1>Post not found</h1>
        <p>${escapeHtml(msg)}</p>
        ${tech}
        <a href="/blog">← Back to Blog</a>
      </div>
    `;
  }

  // Get slug from query string
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    renderError('No post specified.');
    return;
  }

  fetch('posts/posts.json', { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(posts => {
      if (!Array.isArray(posts)) throw new Error('posts.json is not an array');
      const post = posts.find(p => p.slug === slug);
      if (!post) {
        renderError(`No post with slug "${slug}".`);
        return;
      }
      renderPost(post, posts);
    })
    .catch(err => {
      renderError('Could not load this post.', err.message);
      console.error(err);
    });
})();
</script>

</body>
</html>
